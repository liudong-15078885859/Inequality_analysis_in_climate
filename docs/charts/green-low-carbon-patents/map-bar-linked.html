<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Chart · 绿色低碳专利地图与分领域联动</title>
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: 0; display: block; }
  </style>
</head>
<body>
  <iframe id="frame" src="../../green-low-carbon-patents/test.html" loading="eager"></iframe>
  <script type="module">
    import { initIframeKeepMultiple, EMBED_SINGLE_FRAME_CSS } from "../wrapper-utils.js";

    initIframeKeepMultiple(document.getElementById('frame'), {
      targetSelectors: ['#chart-tech-map', '#chart-tech-sector'],
      keepClosestSelector: '.card',
      hideSelectors: ['header', '.stats-row', '.insight-box'],
      extraCss: `${EMBED_SINGLE_FRAME_CSS}
.dashboard {
  grid-template-columns: 1fr !important;
  grid-template-rows: auto auto !important;
  gap: 20px !important;
  margin-bottom: 0 !important;
}
.dashboard [data-charts-keep="1"] {
  height: auto !important;
  max-height: none !important;
  min-height: 360px;
}
`,
      waitMs: 400,
    });
  </script>
</body>
</html>
